<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="ハートピア 曲リスト（公開）" />
  <title>なおきレコードショップ</title>
  <link rel="stylesheet" href="./styles/common.css" />
  <link rel="stylesheet" href="./styles/index.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>なおきレコードショップ</h1>
        <div class="sub">レコードの情報を確認できるサイトです</div>
      </div>
      <div class="chip" title="HTML + JSON の静的ファイルで動作します">
        <span class="dot ok"></span> Static Files
      </div>
    </header>

    <section class="card calendarCard" aria-label="演奏スケジュール">
      <div class="calendarHead">公開予定カレンダー</div>
      <div class="calendarWrap"><div class="calendar" id="calendar"></div></div>
    </section>

    <section class="card" aria-label="曲リスト">
      <div class="controls">
        <div class="field">
          <label for="q">検索（タイトル / 分類）</label>
          <input id="q" type="search" placeholder="例: Undertale / ノクターン / ゼルダ" autocomplete="off" />
        </div>
        <div class="field">
          <label for="category">分類</label>
          <select id="category"><option value="">すべて</option></select>
        </div>
        <div class="field">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="">すべて</option><option value="公開">公開</option><option value="非公開">非公開</option><option value="準備中">準備中</option>
          </select>
        </div>
        <label class="toggle" title="公開だけに絞り込み"><input id="onlyPublic" type="checkbox" />公開のみ表示</label>
      </div>
      <div class="stats" id="stats"></div>
      <div class="tableWrap">
        <table>
          <thead><tr>
            <th data-key="status">ステータス<span class="sort" id="sort-status"></span></th>
            <th data-key="title">タイトル<span class="sort" id="sort-title"></span></th>
            <th data-key="jp">和名<span class="sort" id="sort-jp"></span></th>
            <th data-key="category">分類<span class="sort" id="sort-category"></span></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="mobileList" id="mobileList"></div>
    </section>

    <footer>
    </footer>
  </div>

  <script src="./scripts/ui-common.js" defer></script>
  <script src="./scripts/index.js" defer></script>
</body>
</html>
