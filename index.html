<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="ハートピア 曲リスト（公開）" />
  <title>なおきレコードショップ</title>

  <style>
    :root{
      /* Pastel theme */
      --bg:#fbfbff;
      --card:#ffffffcc;
      --text:#243047;
      --muted:#6a7898;
      --line: rgba(36,48,71,.10);

      --accent:#7aa7ff;

      --ok:#67d9b7;
      --warn:#ffd27a;
      --bad:#ff8fb0;

      --chip: rgba(36,48,71,.06);

      --shadow: 0 12px 30px rgba(36,48,71,.10);
      --radius: 18px;
      --radius2: 14px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(900px 520px at 10% 0%, rgba(255, 184, 208,.55), transparent 60%),
        radial-gradient(900px 520px at 90% 10%, rgba(186, 224, 255,.60), transparent 60%),
        radial-gradient(900px 520px at 20% 90%, rgba(200, 255, 226,.55), transparent 60%),
        radial-gradient(900px 520px at 80% 95%, rgba(255, 240, 188,.55), transparent 60%),
        var(--bg);
    }
    a{color:inherit}
    .wrap{max-width:1100px; margin:0 auto; padding:28px 16px 50px;}
    header{
      display:flex; gap:14px; align-items:flex-end; justify-content:space-between;
      padding:8px 2px 18px;
    }
    .title{display:flex; flex-direction:column; gap:6px;}
    h1{margin:0; font-size:28px; letter-spacing:.02em}
    .sub{color:var(--muted); font-size:13px}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.75));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }

    .calendarCard{margin:0 -16px 16px;}
    .calendarHead{
      padding:14px;
      border-bottom:1px solid var(--line);
      background: linear-gradient(90deg, rgba(186,224,255,.18), rgba(200,255,226,.16));
      font-weight:700;
    }
    .calendarWrap{padding:0; overflow:hidden}
    .calendar{display:flex; flex-direction:column; gap:14px}
    .calendarMonthHeading{
      font-size:14px;
      font-weight:700;
      color:var(--text);
      text-align:center;
      margin-bottom:8px;
    }
    .calendarGrid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:0;
    }
    .calendarLabel{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      text-align:center;
      padding:6px 4px;
    }
    .calendarDay{
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      border-top:none;
      border-bottom:none;
      border-radius:0;
      padding:6px 5px;
      min-height:108px;
      background:rgba(255,255,255,.72);
      overflow:hidden;
    }
    .calendarDay.outside{opacity:.45}
    .calendarDate{font-size:12px; font-weight:700; margin-bottom:6px}
    .calendarItems{display:flex; flex-direction:column; gap:4px}
    .calendarItem{
      --calendar-item-bg: rgba(122,167,255,.12);
      --calendar-item-border: rgba(36,48,71,.10);
      padding:4px 5px;
      border-radius:8px;
      border:1px solid var(--calendar-item-border);
      background:var(--calendar-item-bg);
      font-size:11px;
      line-height:1.25;
    }
    .calendarItem.daySlot{
      --calendar-item-bg: rgba(251,146,60,.16);
      --calendar-item-border: rgba(234,88,12,.25);
    }
    .calendarItem.nightSlot{
      --calendar-item-bg: rgba(122,167,255,.12);
      --calendar-item-border: rgba(36,48,71,.10);
    }
    .calendarSlotHead{display:flex; align-items:center; margin-bottom:3px}
    .calendarIcon{width:12px; height:12px; flex:0 0 auto}
    .calendarSongList{margin:0; padding-left:0; list-style:none}
    .calendarSongList li{margin:1px 0; font-size:10px; position:relative; overflow:hidden; white-space:nowrap}
    .calendarSongList li::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width:26px;
      height:100%;
      background:linear-gradient(90deg, rgba(122,167,255,0), rgba(122,167,255,0) 55%, var(--calendar-item-bg));
      pointer-events:none;
    }
    .calendarEmpty{font-size:12px; color:var(--muted)}

    @media (max-width: 700px){
      .calendarMonthHeading{font-size:13px}
      .calendarLabel{font-size:11px; padding:6px 2px}
      .calendarDay{padding:5px 4px; min-height:96px}
      .calendarDate{font-size:11px; margin-bottom:4px}
      .calendarItem{padding:3px 4px; font-size:10px}
      .calendarSongList li{font-size:9px}
      .calendarSongList{padding-left:0}
      .calendarSongList li::after{width:18px}
    }

    .controls{
      display:grid;
      grid-template-columns: 1.4fr .7fr .7fr auto;
      gap:10px;
      padding:14px;
      border-bottom:1px solid var(--line);
      background: linear-gradient(90deg, rgba(255,184,208,.20), rgba(186,224,255,.18), rgba(200,255,226,.16));
    }
    @media (max-width: 860px){ .controls{grid-template-columns: 1fr 1fr;} }
    @media (max-width: 520px){
      .controls{grid-template-columns: 1fr;}
      header{flex-direction:column; align-items:flex-start}
    }

    .field{display:flex; flex-direction:column; gap:6px;}
    label{font-size:12px; color:var(--muted)}

    input[type="search"], select{
      width:100%;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(36,48,71,.12);
      background: rgba(255,255,255,.75);
      color:var(--text);
      outline:none;
    }
    input[type="search"]::placeholder{color:rgba(106,120,152,.75)}
    input[type="search"]:focus, select:focus{
      border-color: rgba(122,167,255,.55);
      box-shadow: 0 0 0 4px rgba(122,167,255,.18);
    }

    .toggle{
      display:flex; align-items:center; gap:8px;
      padding:0;
      border:none;
      background:transparent;
      user-select:none;
      cursor:pointer;
      white-space:nowrap;
    }
    .toggle input{accent-color: var(--accent); transform: translateY(1px);}

    .stats{display:none}

    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.7);
      border:1px solid rgba(36,48,71,.10);
      color:var(--text);
      font-size:12px;
      white-space:nowrap;
      box-shadow: 0 8px 18px rgba(36,48,71,.08);
    }

    .dot{width:8px;height:8px;border-radius:50%;}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    .tableWrap{overflow:auto;}
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:820px;
      font-size:14px;
    }
    thead th{
      position:sticky; top:0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--line);
      text-align:left;
      padding:12px 12px;
      color:var(--muted);
      font-weight:700;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    thead th .sort{
      font-family:var(--mono);
      font-size:12px;
      opacity:.9;
      margin-left:6px;
    }
    tbody td{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      vertical-align:top;
    }
    tbody tr:hover{background:rgba(122,167,255,.08)}


    .mobileList{display:none}
    .mobileRecordCard{
      padding:12px;
      margin:0 14px 10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.8);
      box-shadow: 0 8px 20px rgba(36,48,71,.08);
    }
    .mobileCardRow{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .mobileTitleGroup{min-width:0; flex:1 1 auto}
    .mobileMetaRow{display:flex; align-items:center; justify-content:flex-end; gap:6px; flex:0 0 auto}
    .mobileMetaRow .badge{box-shadow:none}
    .mobileMetaRow .chip{max-width:100%}
    .mobileTitleMuted{font-size:10px; color:var(--muted); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .mobileJpMain{font-size:14px; font-weight:700; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .recordLink{cursor:pointer}

    @media (max-width: 700px){
      .tableWrap{display:none}
      .mobileList{display:block}
    }

    .col-title{font-weight:700}
    .muted{color:var(--muted)}

    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(36,48,71,.10);
      background: rgba(255,255,255,.70);
      font-size:12px;
      box-shadow: 0 8px 18px rgba(36,48,71,.08);
    }
    .status-public .dot{background:var(--ok)}
    .status-private .dot{background:var(--bad)}
    .status-wip .dot{background:var(--warn)}

    footer{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      padding:0 4px;
    }
    .kbd{
      font-family:var(--mono);
      padding:.12em .45em;
      border:1px solid rgba(36,48,71,.14);
      border-bottom-width:2px;
      border-radius:10px;
      background:rgba(255,255,255,.70);
      color:var(--text);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>なおきレコードショップ</h1>
        <div class="sub">レコードの情報を確認できるサイトです</div>
      </div>
      <div class="chip" title="HTML + JSON の静的ファイルで動作します">
        <span class="dot ok"></span> Static Files
      </div>
    </header>

    <section class="card calendarCard" aria-label="演奏スケジュール">
      <div class="calendarHead">records-schedule カレンダー（日曜開始）</div>
      <div class="calendarWrap">
        <div class="calendar" id="calendar"></div>
      </div>
    </section>

    <section class="card" aria-label="曲リスト">
      <div class="controls">
        <div class="field">
          <label for="q">検索（タイトル / 和名 / 分類）</label>
          <input id="q" type="search" placeholder="例: Undertale / ノクターン / ゼルダ" autocomplete="off" />
        </div>
        <div class="field">
          <label for="category">分類</label>
          <select id="category">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="">すべて</option>
            <option value="公開">公開</option>
            <option value="非公開">非公開</option>
            <option value="準備中">準備中</option>
          </select>
        </div>
        <label class="toggle" title="公開だけに絞り込み">
          <input id="onlyPublic" type="checkbox" checked />
          公開のみ表示
        </label>
      </div>
      <div class="stats" id="stats"></div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th data-key="status">ステータス<span class="sort" id="sort-status"></span></th>
              <th data-key="title">タイトル<span class="sort" id="sort-title"></span></th>
              <th data-key="jp">和名<span class="sort" id="sort-jp"></span></th>
              <th data-key="category">分類<span class="sort" id="sort-category"></span></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="mobileList" id="mobileList"></div>
    </section>

    <footer>
      <div>操作: 検索欄で絞り込み / 分類・ステータスでフィルタ / ヘッダクリックで昇順・降順。</div>
      <div>ヒント: <span class="kbd">Ctrl</span> + <span class="kbd">F</span> でも検索できます。</div>
    </footer>
  </div>

  <script>
    // ===== データ読み込み =====
    let songs = [];
    let scheduleItems = [];

    async function loadSongs() {
      const response = await fetch("./records.json");
      if (!response.ok) {
        throw new Error(`曲データの読み込みに失敗しました: ${response.status}`);
      }
      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    async function loadSchedule() {
      const response = await fetch("./records-schedule.json");
      if (!response.ok) {
        throw new Error(`スケジュールデータの読み込みに失敗しました: ${response.status}`);
      }
      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    // ===== UIロジック =====
    const els = {
      q: document.getElementById("q"),
      category: document.getElementById("category"),
      status: document.getElementById("status"),
      onlyPublic: document.getElementById("onlyPublic"),
      tbody: document.getElementById("tbody"),
      stats: document.getElementById("stats"),
      mobileList: document.getElementById("mobileList"),
      calendar: document.getElementById("calendar"),
      ths: Array.from(document.querySelectorAll("thead th[data-key]")),
    };

    const weekLabels = ["日", "月", "火", "水", "木", "金", "土"];

    function renderCalendar(){
      if (!scheduleItems.length){
        els.calendar.innerHTML = `<div class="calendarEmpty">スケジュールがありません。</div>`;
        return;
      }

      const songMap = new Map(songs.map(s => [Number(s.no), s]));
      const groupedByDate = new Map();
      for (const item of scheduleItems){
        const date = (item.date || "").trim();
        if (!date) continue;
        if (!groupedByDate.has(date)) groupedByDate.set(date, []);
        groupedByDate.get(date).push(item);
      }

      for (const entries of groupedByDate.values()){
        entries.sort((a,b)=> (a.time || "").localeCompare((b.time || ""), "ja"));
      }

      const dates = [...groupedByDate.keys()].sort((a,b)=>a.localeCompare(b));
      const monthKeys = [...new Set(dates.map(date => date.slice(0, 7)))];
      const monthParts = [];

      for (const monthKey of monthKeys){
        const [yearText, monthText] = monthKey.split("-");
        const year = Number(yearText);
        const month = Number(monthText);
        const monthStart = new Date(year, month - 1, 1);
        const monthEnd = new Date(year, month, 0);

        const startDate = new Date(monthStart);
        startDate.setDate(monthStart.getDate() - monthStart.getDay());
        const endDate = new Date(monthEnd);
        endDate.setDate(monthEnd.getDate() + (6 - monthEnd.getDay()));

        const gridParts = weekLabels.map(label => `<div class="calendarLabel">${label}</div>`);
        const current = new Date(startDate);
        while (current <= endDate){
          const y = current.getFullYear();
          const m = String(current.getMonth() + 1).padStart(2, "0");
          const d = String(current.getDate()).padStart(2, "0");
          const iso = `${y}-${m}-${d}`;
          const entries = groupedByDate.get(iso) || [];
          const outside = current.getMonth() !== (month - 1);

          gridParts.push(`
            <div class="calendarDay ${outside ? "outside" : ""}">
              <div class="calendarDate">${current.getDate()}</div>
              <div class="calendarItems">
                ${entries.length
                  ? (() => {
                      const groupedByTime = new Map();
                      for (const entry of entries){
                        const timeKey = (entry.time || "-").trim() || "-";
                        if (!groupedByTime.has(timeKey)) groupedByTime.set(timeKey, []);
                        groupedByTime.get(timeKey).push(entry);
                      }
                      return [...groupedByTime.entries()]
                        .sort((a,b)=>a[0].localeCompare(b[0], "ja"))
                        .map(([time, slotEntries]) => {
                          const songsHtml = slotEntries.map(entry => {
                            const song = songMap.get(Number(entry.record_id));
                            const title = song ? (song.jp || song.title || `ID:${entry.record_id}`) : `ID:${entry.record_id}`;
                            return `<li>${escapeHtml(title)}</li>`;
                          }).join("");
                          const iconPath = iconPathForTime(time);
                          const slotClass = slotThemeClass(time);
                          const icon = iconPath ? `<div class="calendarSlotHead"><img class="calendarIcon" src="${iconPath}" alt="" aria-hidden="true"></div>` : "";
                          return `<div class="calendarItem ${slotClass}">${icon}<ul class="calendarSongList">${songsHtml}</ul></div>`;
                        })
                        .join("");
                    })()
                  : `<div class="calendarEmpty">-</div>`}
              </div>
            </div>
          `);

          current.setDate(current.getDate() + 1);
        }

        monthParts.push(`
          <section class="calendarMonth">
            <div class="calendarMonthHeading">${year}年${month}月</div>
            <div class="calendarGrid">${gridParts.join("")}</div>
          </section>
        `);
      }

      els.calendar.innerHTML = monthParts.join("");
    }

    function getStartHour(timeText){
      const start = (timeText || "").split("-")[0]?.trim() || "";
      const [hour] = start.split(":");
      const n = Number(hour);
      return Number.isFinite(n) ? n : null;
    }

    function iconPathForTime(timeText){
      const hour = getStartHour(timeText);
      if (hour === null) return "";
      if (hour >= 6 && hour < 16) return "./icon-sunrise-slot.svg";
      if (hour >= 16 && hour < 30) return "./icon-night-slot.svg";
      return "";
    }


    function slotThemeClass(timeText){
      const hour = getStartHour(timeText);
      if (hour === null) return "nightSlot";
      if (hour >= 6 && hour < 16) return "daySlot";
      if (hour >= 16 && hour < 30) return "nightSlot";
      return "nightSlot";
    }

    function buildCategoryOptions(){
      const categories = [...new Set(songs.map(s => (s.category || "").trim()).filter(Boolean))]
        .sort((a,b)=>a.localeCompare(b,"ja"));
      for (const c of categories){
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        els.category.appendChild(opt);
      }
    }

    let sortKey = "category";
    let sortDir = "asc"; // asc | desc

    function normalize(str){
      return (str ?? "").toString().toLowerCase();
    }

    // カテゴリごとにパステル色を割り当て
    function hashHue(str){
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
      return h % 360;
    }
    function pastelForCategory(category){
      const c = (category || "other").trim() || "other";
      const hue = hashHue(c);
      const bg = `hsl(${hue} 75% 92%)`;
      const border = `hsl(${hue} 55% 80%)`;
      const text = `hsl(${hue} 35% 28%)`;
      return { bg, border, text };
    }

    function statusBadge(status){
      const s = (status || "").trim();
      let cls = "status-public";
      if (s === "非公開") cls = "status-private";
      if (s === "準備中") cls = "status-wip";
      return `<span class="badge ${cls}"><span class="dot"></span>${escapeHtml(s || "-")}</span>`;
    }

    function escapeHtml(str){
      return (str ?? "").toString()
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function applyFilters(){
      const q = normalize(els.q.value).trim();
      const cat = (els.category.value || "").trim();
      const st = (els.status.value || "").trim();
      const onlyPub = els.onlyPublic.checked;

      let rows = songs.slice();

      if (onlyPub) rows = rows.filter(s => (s.status || "").trim() === "公開");
      if (cat) rows = rows.filter(s => (s.category || "").trim() === cat);
      if (st) rows = rows.filter(s => (s.status || "").trim() === st);

      if (q){
        rows = rows.filter(s => {
          const hay = `${s.title} ${s.jp} ${s.category} ${s.status}`;
          return normalize(hay).includes(q);
        });
      }

      rows.sort((a,b)=>{
        const av = (a[sortKey] ?? "").toString();
        const bv = (b[sortKey] ?? "").toString();
        const cmp = av.localeCompare(bv, "ja", { numeric:true, sensitivity:"base" });
        return sortDir === "asc" ? cmp : -cmp;
      });

      render(rows);
      renderStats(rows.length);
      renderSortIndicators();
    }

    function render(rows){
      els.tbody.innerHTML = rows.map(s => `
        <tr class="recordLink" data-record-id="${Number(s.no)}">
          <td>${statusBadge(s.status)}</td>
          <td class="col-title">${escapeHtml(s.title || "-")}</td>
          <td>${escapeHtml(s.jp || "-")}</td>
          <td>${
            s.category
              ? (() => {
                  const p = pastelForCategory(s.category);
                  return `<span class="chip" style="background:${p.bg};border-color:${p.border};color:${p.text}">
                    ${escapeHtml(s.category)}
                  </span>`;
                })()
              : `<span class="muted">-</span>`
          }</td>
        </tr>
      `).join("");

      els.mobileList.innerHTML = rows.map(s => {
        const categoryHtml = s.category
          ? (() => {
              const p = pastelForCategory(s.category);
              return `<span class="chip" style="background:${p.bg};border-color:${p.border};color:${p.text}">${escapeHtml(s.category)}</span>`;
            })()
          : `<span class="muted">-</span>`;

        return `<article class="mobileRecordCard recordLink" data-record-id="${Number(s.no)}">
          <div class="mobileCardRow">
            <div class="mobileTitleGroup">
              <div class="mobileTitleMuted">${escapeHtml(s.title || "-")}</div>
              <div class="mobileJpMain">${escapeHtml(s.jp || "-")}</div>
            </div>
            <div class="mobileMetaRow">
              ${categoryHtml}
              ${statusBadge(s.status)}
            </div>
          </div>
        </article>`;
      }).join("");

      bindRecordLinks();
    }

    function bindRecordLinks(){
      const links = Array.from(document.querySelectorAll(".recordLink[data-record-id]"));
      links.forEach(el => {
        el.addEventListener("click", () => {
          const recordId = Number(el.getAttribute("data-record-id"));
          if (!Number.isInteger(recordId)) return;
          window.location.href = `./detail.html?record=${recordId}`;
        });
      });
    }

    function renderStats(visible){
      els.stats.innerHTML = "";
    }

    function renderSortIndicators(){
      for (const th of els.ths){
        const key = th.dataset.key;
        const el = document.getElementById(`sort-${key}`);
        if (!el) continue;
        el.textContent = "";
      }
    }

    // イベント
    els.q.addEventListener("input", applyFilters);
    els.category.addEventListener("change", applyFilters);
    els.status.addEventListener("change", applyFilters);
    els.onlyPublic.addEventListener("change", applyFilters);

    els.ths.forEach(th => {
      th.addEventListener("click", () => {
        const key = th.dataset.key;
        if (sortKey === key) sortDir = (sortDir === "asc" ? "desc" : "asc");
        else { sortKey = key; sortDir = "asc"; }
        applyFilters();
      });
    });

    // 初期表示
    (async () => {
      try {
        songs = await loadSongs();
        scheduleItems = await loadSchedule();
        buildCategoryOptions();
        renderCalendar();
        applyFilters();
      } catch (error) {
        console.error(error);
        els.tbody.innerHTML = `<tr><td colspan="4" class="muted">曲データの読み込みに失敗しました。</td></tr>`;
        els.stats.innerHTML = `<span class="chip"><span class="dot bad"></span> 読み込みエラー</span>`;
      }
    })();
  </script>
</body>
</html>
