name: Update records schedule

on:
  schedule:
    - cron: "0 21 * * *" # JST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-records-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update records-schedule.json
        run: node scripts/update-records-schedule.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add records-schedule.json
          git commit -m "chore: auto update records schedule"
          git push
